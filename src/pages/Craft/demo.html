<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>瓦当拖拽制作</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent !important;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-wrap {
      width: 980px;
      max-width: 96vw;
      height: 600px;
      max-height: 96vh;
      display: grid;
      grid-template-columns: 230px 1fr 250px;
      gap: 18px;
      background: transparent;
    }

    .panel {
      border-radius: 24px;
      border: none;
      background: transparent;
      padding: 18px;
      color: #2f2a27;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #46362d;
      margin-bottom: 8px;
    }

    .panel-sub {
      font-size: 13px;
      line-height: 1.8;
      color: #75675f;
      margin-bottom: 16px;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tool-card {
      border-radius: 20px;
      border: none;
      background: transparent;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: 0.25s ease;
      user-select: none;
      position: relative;
    }

    .tool-card.current {
      border: none;
      background: transparent;
      cursor: grab;
    }

    .tool-card.current:active {
      cursor: grabbing;
    }

    .tool-card.locked {
      opacity: 0.42;
      filter: grayscale(0.2);
      cursor: not-allowed;
    }

    .tool-card.done {
      opacity: 0.55;
    }

    .tool-thumb {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .tool-thumb img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      pointer-events: none;
    }

    /* 这行只修拖拽，不改样式 */
    .tool-thumb svg {
      width: 48px;
      height: 48px;
      pointer-events: none;
    }

    .tool-info {
      flex: 1;
      min-width: 0;
    }

    .tool-name {
      font-size: 15px;
      font-weight: 700;
      color: #44352c;
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 12px;
      color: #7c7069;
      line-height: 1.6;
    }

    .tool-badge {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 10px;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.14);
      color: #7b6d65;
    }

    .tool-badge.now {
      background: rgba(125, 89, 61, 0.16);
      color: #6b4c38;
    }

    .tool-badge.done {
      background: rgba(118, 153, 115, 0.18);
      color: #4e7750;
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hint-box {
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      padding: 11px 16px;
      font-size: 14px;
      color: #4b5a60;
      background: transparent;
      border: none;
      border-bottom: 1px dashed #9caeb9;
      margin-bottom: 16px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "SimKai", "KaiTi", serif;
    }

    .drop-zone {
      width: 390px;
      height: 390px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s ease;
      border: none;
      background: transparent;
      overflow: hidden;
    }

    .drop-zone.dragover {
      transform: scale(1.02);
      border-color: rgba(125, 89, 61, 0.42);
      box-shadow: 0 0 0 12px rgba(125, 89, 61, 0.05);
    }

    .drop-label {
      position: absolute;
      bottom: -30px;
      font-size: 13px;
      color: #7d7068;
    }

    .status-box {
      width: 100%;
      margin-top: 20px;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 13px;
      text-align: center;
      line-height: 1.8;
      color: #685c55;
      background: transparent;
      border: none;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .done-text {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 700;
      color: #8b5f2b;
      opacity: 0;
      transform: translateY(8px);
      transition: 0.35s ease;
    }

    .done-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step-card {
      border-radius: 18px;
      padding: 14px;
      border: none;
      background: transparent;
      transition: 0.25s ease;
    }

    .step-card.active {
      border: none;
      background: transparent;
    }

    .step-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      gap: 8px;
    }

    .step-title {
      font-size: 15px;
      font-weight: 700;
      color: #43342c;
    }

    .step-tag {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #7a6d66;
      white-space: nowrap;
    }

    .step-tag.done {
      background: rgba(118, 153, 115, 0.18);
      color: #4e7750;
    }

    .step-text {
      font-size: 12px;
      line-height: 1.7;
      color: #7b6f68;
    }

    .reset-btn {
      margin-top: 16px;
      width: auto;
      padding: 11px 24px;
      background: transparent;
      color: #4b5a60;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
      border: none;
      border-bottom: 1px dashed #9caeb9;
      font-family: "SimKai", "KaiTi", serif;
    }

    .reset-btn:hover {
      color: #6f7d84;
      border-bottom: 1px solid #9caeb9;
    }

    .pulse {
      animation: pulse 0.55s ease;
    }

    .fire-glow {
      animation: fireGlow 1.3s ease-in-out infinite alternate;
    }

    #patternImg {
      position: absolute;
      width: 208px;
      height: 208px;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 0.45s ease, transform 0.45s ease, filter 0.45s ease;
      pointer-events: none;
      z-index: 4;
    }

    #patternImg.show {
      opacity: 1;
      transform: scale(1);
    }

    #flyKnife {
      position: absolute;
      width: 96px;
      height: 96px;
      object-fit: contain;
      left: 40px;
      top: 150px;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transform: translate(0, 0) rotate(-20deg) scale(0.8);
    }

    #flyKnife.play {
      animation: flyKnifeToCenter 0.75s ease forwards;
    }

    .mud-disc {
      transition: fill 0.5s ease, stroke 0.5s ease;
    }

    @keyframes flyKnifeToCenter {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(-20deg) scale(0.75);
      }
      20% {
        opacity: 1;
      }
      70% {
        opacity: 1;
        transform: translate(110px, -22px) rotate(8deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(125px, -6px) rotate(0deg) scale(0.92);
      }
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes fireGlow {
      from { filter: drop-shadow(0 0 5px rgba(255, 146, 54, 0.36)); }
      to   { filter: drop-shadow(0 0 16px rgba(255, 146, 54, 0.7)); }
    }

    @media (max-width: 930px) {
      .game-wrap {
        grid-template-columns: 1fr;
        height: auto;
      }

      .drop-zone {
        width: 320px;
        height: 320px;
      }

      #patternImg {
        width: 170px;
        height: 170px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="panel" style="text-align: center;">
      <div class="panel-title" style="text-align: center;">工具</div>
      <div class="panel-sub" style="text-align: center;">
        把左边当前步骤的工具拖到中间制作区域。
      </div>

      <div class="tools">
        <div class="tool-card current" draggable="true" data-tool="clay">
          <span class="tool-badge now">当前步骤</span>
          <div class="tool-thumb">
            <svg width="50" height="50" viewBox="0 0 52 52">
              <ellipse cx="26" cy="31" rx="17" ry="12" fill="#9a7458"/>
              <ellipse cx="20" cy="24" rx="8" ry="5" fill="#b58a69" opacity="0.7"/>
            </svg>
          </div>
          <div class="tool-info">
            <div class="tool-name">泥团</div>
          </div>
        </div>

        <div class="tool-card locked" draggable="false" data-tool="carve">
          <span class="tool-badge">未解锁</span>
          <div class="tool-thumb">
            <img src="../../assets/images/craft/kedao.png" alt="刻刀">
          </div>
          <div class="tool-info">
            <div class="tool-name">刻刀</div>
          </div>
        </div>

        <div class="tool-card locked" draggable="false" data-tool="fire">
          <span class="tool-badge">未解锁</span>
          <div class="tool-thumb">
            <svg width="50" height="50" viewBox="0 0 52 52">
              <path d="M26 10
                       C30 19,20 22,25 30
                       C30 27,34 23,35 18
                       C42 27,40 37,33 42
                       C28 46,21 45,17 39
                       C11 31,13 22,19 17
                       C20 23,23 27,27 29
                       C24 24,23 19,26 10Z"
                    fill="#f39a3c"/>
              <path d="M25 21
                       C28 26,24 29,26 34
                       C29 32,31 29,31 26
                       C35 31,33 37,28 39
                       C24 40,19 38,18 33
                       C17 29,19 24,25 21Z"
                    fill="#ffd073"/>
            </svg>
          </div>
          <div class="tool-info">
            <div class="tool-name">窑火</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel center-panel">
      <div class="hint-box" id="hintBox"><strong>请把“泥团”拖到中间制作区域</strong></div>

      <div class="drop-zone" id="dropZone">
        <svg id="wadangSvg" width="310" height="310" viewBox="0 0 310 310">
          <circle id="outerRing" cx="155" cy="155" r="111"
                  fill="rgba(255,255,255,0.03)"
                  stroke="rgba(125,110,100,0.25)"
                  stroke-width="2"
                  stroke-dasharray="7 7"></circle>

          <circle id="mainDisc" class="mud-disc" cx="155" cy="155" r="92"
                  fill="rgba(255,255,255,0.06)"
                  stroke="rgba(150,140,130,0.18)"
                  stroke-width="2"></circle>

          <circle id="ring1" cx="155" cy="155" r="72"
                  fill="none"
                  stroke="rgba(255,255,255,0)"
                  stroke-width="2"></circle>

          <circle id="ring2" cx="155" cy="155" r="52"
                  fill="none"
                  stroke="rgba(255,255,255,0)"
                  stroke-width="2"></circle>

          <g id="fireGroup" opacity="0">
            <path d="M155 61
                     C163 82, 147 91, 156 108
                     C164 103, 171 95, 173 82
                     C187 98, 187 124, 174 140
                     C164 153, 148 158, 134 150
                     C113 138, 110 112, 123 96
                     C127 109, 138 113, 145 117
                     C141 104, 142 93, 149 80
                     C152 75, 154 69, 155 61Z"
                  fill="rgba(243,153,60,0.82)"></path>
          </g>
        </svg>

        <img id="patternImg" src="../../assets/images/craft/huawen.png" alt="花纹">
        <img id="flyKnife" src="../../assets/images/craft/kedao.png" alt="刻刀动画">

        <div class="drop-label">把工具拖到这里</div>
      </div>

      <div class="done-text" id="doneText">瓦当制作完成</div>

      <div class="status-box" id="statusBox">
        当前状态：等待开始
      </div>
    </div>

    <div class="panel" style="text-align: center;">
      <div class="panel-title" style="text-align: center;">制作步骤</div>
      <div class="panel-sub" style="text-align: center;">制泥成坯 → 刻出花纹 → 烧制定型</div>

      <div class="steps">
        <div class="step-card active" id="step0">
          <div class="step-row">
            <div class="step-title">第一步：制泥成坯</div>
            <div class="step-tag" id="tag0">进行中</div>
          </div>
          <div class="step-text">将泥料压入模具，形成瓦当基础轮廓。</div>
        </div>

        <div class="step-card" id="step1">
          <div class="step-row">
            <div class="step-title">第二步：修整刻纹</div>
            <div class="step-tag" id="tag1">未开始</div>
          </div>
          <div class="step-text">拖入刻刀，中心花纹出现。</div>
        </div>

        <div class="step-card" id="step2">
          <div class="step-row">
            <div class="step-title">第三步：烧制定型</div>
            <div class="step-tag" id="tag2">未开始</div>
          </div>
          <div class="step-text">拖入窑火，泥坯颜色变深。</div>
        </div>
      </div>

      <button class="reset-btn" id="resetBtn">重新开始</button>
    </div>
  </div>

  <script>
    const steps = [
      {
        tool: "clay",
        toolName: "泥团",
        hint: '请把“泥团”拖到中间制作区域',
        success: "第一步完成：已经压出了瓦当坯体。"
      },
      {
        tool: "carve",
        toolName: "刻刀",
        hint: '请把“刻刀”拖到中间制作区域',
        success: "第二步完成：刻刀进入中心，花纹已经出现。"
      },
      {
        tool: "fire",
        toolName: "窑火",
        hint: '请把“窑火”拖到中间制作区域',
        success: "第三步完成：泥坯已经烧成深色。"
      }
    ];

    let currentStep = 0;
    let draggedTool = null;
    let progress = [false, false, false];

    const toolCards = document.querySelectorAll(".tool-card");
    const dropZone = document.getElementById("dropZone");
    const hintBox = document.getElementById("hintBox");
    const statusBox = document.getElementById("statusBox");
    const doneText = document.getElementById("doneText");
    const resetBtn = document.getElementById("resetBtn");

    const mainDisc = document.getElementById("mainDisc");
    const outerRing = document.getElementById("outerRing");
    const ring1 = document.getElementById("ring1");
    const ring2 = document.getElementById("ring2");
    const fireGroup = document.getElementById("fireGroup");
    const patternImg = document.getElementById("patternImg");
    const flyKnife = document.getElementById("flyKnife");

    const stepSoundVolume = 0.8;
    const stepSounds = {
      clay: new Audio("../../assets/audio/he_ni.mp3"),
      carve: new Audio("../../assets/audio/diao_ke.mp3"),
      fire: new Audio("../../assets/audio/shao_huo.mp3")
    };
    let activeStepSound = null;

    Object.values(stepSounds).forEach((audio) => {
      audio.volume = stepSoundVolume;
      audio.preload = "auto";
      audio.addEventListener("ended", () => {
        if (activeStepSound === audio) {
          activeStepSound = null;
        }
      });
    });

    function stopStepSounds() {
      Object.values(stepSounds).forEach((audio) => {
        audio.pause();
        audio.currentTime = 0;
      });
      activeStepSound = null;
    }

    function playStepSound(tool) {
      const audio = stepSounds[tool];
      if (!audio) return;
      stopStepSounds();
      activeStepSound = audio;
      audio.currentTime = 0;
      audio.play().catch(() => {
        if (activeStepSound === audio) activeStepSound = null;
      });
    }

    function cleanupWadangAudio() {
      stopStepSounds();
    }

    function refreshTools() {
      toolCards.forEach((card, index) => {
        const badge = card.querySelector(".tool-badge");
        card.classList.remove("current", "locked", "done");
        badge.classList.remove("now", "done");

        if (index < currentStep) {
          card.classList.add("done");
          card.setAttribute("draggable", "false");
          badge.textContent = "已完成";
          badge.classList.add("done");
        } else if (index === currentStep && currentStep < steps.length) {
          card.classList.add("current");
          card.setAttribute("draggable", "true");
          badge.textContent = "当前步骤";
          badge.classList.add("now");
        } else {
          card.classList.add("locked");
          card.setAttribute("draggable", "false");
          badge.textContent = "未解锁";
        }
      });
    }

    function refreshSteps() {
      for (let i = 0; i < 3; i++) {
        const card = document.getElementById("step" + i);
        const tag = document.getElementById("tag" + i);
        card.classList.remove("active");
        tag.classList.remove("done");

        if (progress[i]) {
          tag.textContent = "已完成";
          tag.classList.add("done");
        } else if (i === currentStep && currentStep < 3) {
          card.classList.add("active");
          tag.textContent = "进行中";
        } else {
          tag.textContent = "未开始";
        }
      }
    }

    function renderWadang() {
      if (!progress[0]) {
        mainDisc.setAttribute("fill", "rgba(255,255,255,0.06)");
        mainDisc.setAttribute("stroke", "rgba(150,140,130,0.18)");
        outerRing.setAttribute("stroke-dasharray", "7 7");
      } else {
        mainDisc.setAttribute("fill", "rgba(166,129,98,0.92)");
        mainDisc.setAttribute("stroke", "rgba(122,93,70,0.86)");
        outerRing.setAttribute("stroke-dasharray", "0");
      }

      if (progress[1]) {
        ring1.setAttribute("stroke", "rgba(255,255,255,0.38)");
        ring2.setAttribute("stroke", "rgba(255,255,255,0.25)");
        patternImg.classList.add("show");
      } else {
        ring1.setAttribute("stroke", "rgba(255,255,255,0)");
        ring2.setAttribute("stroke", "rgba(255,255,255,0)");
        patternImg.classList.remove("show");
      }

      if (progress[2]) {
        mainDisc.setAttribute("fill", "rgba(122,68,34,0.98)");
        mainDisc.setAttribute("stroke", "rgba(82,42,18,0.98)");
        fireGroup.setAttribute("opacity", "0");
        dropZone.classList.remove("fire-glow");
        doneText.classList.add("show");
        patternImg.style.filter = "brightness(1.08)";
      } else {
        fireGroup.setAttribute("opacity", "0");
        dropZone.classList.remove("fire-glow");
        doneText.classList.remove("show");
        patternImg.style.filter = "none";
      }
    }

    function refreshText() {
      if (currentStep >= steps.length) {
        hintBox.textContent = "全部步骤完成，你已经做出了一个瓦当";
        statusBox.textContent = '当前状态：瓦当已经制作完成，点击“重新开始”可再次体验。';
      } else {
        hintBox.textContent = steps[currentStep].hint;
      }
    }

    function playKnifeAnimation() {
      flyKnife.classList.remove("play");
      void flyKnife.offsetWidth;
      flyKnife.classList.add("play");

      setTimeout(() => {
        patternImg.classList.add("show");
      }, 420);

      setTimeout(() => {
        flyKnife.classList.remove("play");
      }, 800);
    }

    function doStep(tool) {
      if (currentStep >= steps.length) return;

      const expected = steps[currentStep].tool;
      if (tool !== expected) {
        statusBox.textContent = "当前状态：这一步需要“" + steps[currentStep].toolName + "”。";
        return;
      }

      if (tool === "carve") {
        playKnifeAnimation();
      }

      playStepSound(tool);
      progress[currentStep] = true;
      statusBox.textContent = "当前状态：" + steps[currentStep].success;
      currentStep++;

      dropZone.classList.add("pulse");
      setTimeout(() => dropZone.classList.remove("pulse"), 550);

      refreshTools();
      refreshSteps();
      renderWadang();
      refreshText();
    }

    toolCards.forEach(card => {
      card.addEventListener("dragstart", (e) => {
        if (card.classList.contains("locked") || card.classList.contains("done")) {
          e.preventDefault();
          return;
        }
        draggedTool = card.dataset.tool;
        e.dataTransfer.setData("text/plain", draggedTool);
      });
    });

    document.querySelectorAll(".step-card").forEach((card, index) => {
      card.addEventListener("click", () => {
        const step = steps[index];
        if (step) playStepSound(step.tool);
      });
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const tool = e.dataTransfer.getData("text/plain") || draggedTool;
      doStep(tool);
      draggedTool = null;
    });

    resetBtn.addEventListener("click", () => {
      currentStep = 0;
      draggedTool = null;
      progress = [false, false, false];
      statusBox.textContent = "当前状态：等待开始";
      patternImg.classList.remove("show");
      flyKnife.classList.remove("play");
      cleanupWadangAudio();
      refreshTools();
      refreshSteps();
      renderWadang();
      refreshText();
    });

    window.addEventListener("pagehide", cleanupWadangAudio);
    window.addEventListener("beforeunload", cleanupWadangAudio);

    refreshTools();
    refreshSteps();
    renderWadang();
    refreshText();
  </script>
</body>
</html>
